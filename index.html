<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>DTPI - Sistema de Gestão Geográfica</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.Default.css" />
    <style>
        body { margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f4f4; }
        #map { height: 100vh; width: 100%; z-index: 1; }
        
        .control-panel { 
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            z-index: 1000; background: white; padding: 10px 25px; 
            border-radius: 50px; box-shadow: 0 4px 25px rgba(0,0,0,0.2);
            display: flex; align-items: center; gap: 20px;
        }

        #buscaEndereco { padding: 8px 15px; border-radius: 20px; border: 1px solid #ccc; width: 250px; outline: none; }
        .btn-search { background: #2ecc71; color: white; border: none; padding: 8px 15px; border-radius: 20px; cursor: pointer; font-weight: bold; }
        .btn-search:hover { background: #27ae60; }

        .counter { position: absolute; bottom: 30px; right: 20px; z-index: 1000; background: rgba(0,0,0,0.8); color: white; padding: 12px 20px; border-radius: 8px; font-size: 14px; }
        
        .relatorio-painel {
            position: absolute; top: 85px; right: 20px; width: 320px;
            max-height: 75vh; background: white; z-index: 1001;
            border-radius: 12px; box-shadow: 0 8px 25px rgba(0,0,0,0.2);
            display: none; flex-direction: column; border: 1px solid #ddd;
        }
        .relatorio-header { background: #2c3e50; color: white; padding: 12px; border-radius: 12px 12px 0 0; display: flex; justify-content: space-between; align-items: center; }
        .relatorio-corpo { padding: 10px; overflow-y: auto; background: #fff; border-radius: 0 0 12px 12px; }
        
        .card-projeto { border-left: 4px solid #3498db; background: #f8f9fa; padding: 12px; margin-bottom: 10px; border-radius: 4px; font-size: 13px; cursor: pointer; transition: 0.2s; }
        .card-projeto:hover { background: #eef2f7; transform: translateX(5px); }
        .tag-ano-mini { background: #34495e; color: white; padding: 2px 6px; border-radius: 3px; float: right; font-weight: bold; }
        .titulo-rua-label { font-size: 14px; font-weight: bold; color: #2c3e50; display: block; margin-bottom: 5px; border-bottom: 2px solid #3498db; }
    </style>
</head>
<body>

<div class="control-panel">
    <div style="display: flex; align-items: center; gap: 10px;">
        <strong>Ano: <span id="anoDisplay">2026</span></strong>
        <input type="range" id="anoSlider" min="2011" max="2026" value="2026" step="1">
    </div>
    <div style="border-left: 1px solid #ddd; padding-left: 20px; display: flex; gap: 5px;">
        <input type="text" id="buscaEndereco" placeholder="Digite o nome da rua">
        <button class="btn-search" onclick="buscarRua()">Consultar Rua</button>
    </div>
</div>

<div id="count" class="counter">Sincronizando 20.000+ registros...</div>

<div id="painelRelatorio" class="relatorio-painel">
    <div class="relatorio-header">
        <strong>Histórico Geográfico</strong>
        <span style="cursor:pointer; font-size: 20px;" onclick="document.getElementById('painelRelatorio').style.display='none'">×</span>
    </div>
    <div id="listaProjetos" class="relatorio-corpo"></div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.4.1/dist/leaflet.markercluster.js"></script>

<script>
    // 1. Inicialização do Mapa
    const map = L.map('map').setView([-25.4297, -49.2719], 12);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
        attribution: 'DTPI | Jefferson Roger © 2026'
    }).addTo(map);

    const markers = L.markerClusterGroup();
    map.addLayer(markers);
    let bancoDadosLocal = [];
    let markerBusca;

    // 2. Função de Cálculo de Distância (Haversine)
    function calcularDistancia(lat1, lon1, lat2, lon2) {
        const R = 6371000; 
        const dLat = (lat2 - lat1) * Math.PI / 180;
        const dLon = (lon2 - lon1) * Math.PI / 180;
        const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                  Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                  Math.sin(dLon/2) * Math.sin(dLon/2);
        return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
    }

    // 3. Filtro por Ano (Slider)
    function filtrarPorAno(ano) {
        const anoInt = parseInt(ano);
        document.getElementById('anoDisplay').innerText = ano;
        markers.clearLayers();
        
        const filtrados = bancoDadosLocal.filter(p => p.ano === anoInt);
        
        filtrados.forEach(p => {
            let camada;
            const estilo = { color: '#2ecc71', weight: 5, opacity: 0.8 };
            
            if (p.tipo === 'LineString') camada = L.polyline(p.coords, estilo);
            else if (p.tipo === 'Polygon') camada = L.polygon(p.coords, estilo);
            else camada = L.circleMarker(p.coords[0], { radius: 8, ...estilo });
            
            camada.bindPopup(`<b>${p.nome}</b><br>${p.descricao || 'Sem descrição'}`);
            markers.addLayer(camada);
        });
        
        document.getElementById('count').innerText = `${filtrados.length} projetos em ${ano}`;
    }

    // 4. Busca por Rua e Arredores (Lógica Rápida)
async function buscarRua() {
    const ruaInput = document.getElementById('buscaEndereco').value.trim();
    if (!ruaInput) return;

    try {
        // 1. Buscamos a rua e pedimos o Bounding Box (Extensão da rua)
        const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(ruaInput + ", Curitiba")}`);
        const data = await res.json();
        
        if (data.length > 0) {
            const principal = data[0];
            const bbox = principal.boundingbox; // [latMin, latMax, lonMin, lonMax]
            
            // Criamos os limites geográficos da rua inteira
            const southWest = L.latLng(bbox[0], bbox[2]);
            const northEast = L.latLng(bbox[1], bbox[3]);
            const boundsRua = L.latLngBounds(southWest, northEast);

            // Ajusta o mapa para mostrar a rua INTEIRA
            map.fitBounds(boundsRua, { padding: [50, 50] });

            if (markerBusca) map.removeLayer(markerBusca);
            markerBusca = L.marker([principal.lat, principal.lon]).addTo(map).bindPopup(`<b>${ruaInput}</b>`).openPopup();

            // 2. FILTRO POR BOUNDING BOX + TOLERÂNCIA (O segredo da precisão)
            const MARGEM = 0.0005; // Pequena margem de segurança (aprox 50m) para não perder pontos na calçada
            const boundsExpandido = L.latLngBounds(
                [parseFloat(bbox[0]) - MARGEM, parseFloat(bbox[2]) - MARGEM],
                [parseFloat(bbox[1]) + MARGEM, parseFloat(bbox[3]) + MARGEM]
            );

            // Filtra os 20k registros localmente
            const projetosNaRua = bancoDadosLocal.filter(p => {
                const ponto = L.latLng(p.coords[0][0], p.coords[0][1]);
                return boundsExpandido.contains(ponto);
            });

            // 3. Renderiza o Relatório
            const lista = document.getElementById('listaProjetos');
            document.getElementById('painelRelatorio').style.display = 'flex';
            lista.innerHTML = `<span class="titulo-rua-label">${ruaInput} e arredores</span>`;

            if (projetosNaRua.length === 0) {
                lista.innerHTML += `<p style="font-size:12px; padding:10px;">Nenhum registro histórico na extensão desta rua.</p>`;
            } else {
                // Remove duplicados e ordena por ano
                const unicos = Array.from(new Set(projetosNaRua.map(p => p.nome)))
                    .map(nome => projetosNaRua.find(p => p.nome === nome))
                    .sort((a, b) => b.ano - a.ano);

                unicos.forEach(p => {
                    const card = document.createElement('div');
                    card.className = 'card-projeto';
                    card.innerHTML = `<span class="tag-ano-mini">${p.ano}</span><strong>${p.nome}</strong>`;
                    card.onclick = () => {
                        document.getElementById('anoSlider').value = p.ano;
                        filtrarPorAno(p.ano);
                        map.setView(p.coords[0], 19);
                    };
                    lista.appendChild(card);
                });
            }
        } else { alert("Rua não encontrada."); }
    } catch (e) { console.error(e); }
}

    // 5. Carga de Dados
    fetch('dados_mapa.json?v=' + Date.now())
        .then(res => res.json())
        .then(data => {
            bancoDadosLocal = data;
            filtrarPorAno(2026);
        })
        .catch(err => {
            document.getElementById('count').innerText = "Erro ao carregar banco de dados.";
        });

    // Suporte ao Enter na busca
    document.getElementById('buscaEndereco').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') buscarRua();
    });

    // Listener do Slider
    document.getElementById('anoSlider').oninput = (e) => filtrarPorAno(e.target.value);

</script>
</body>
</html>

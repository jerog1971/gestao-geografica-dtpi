<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>DTPI - Sistema de Gestão Geográfica</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.Default.css" />
    <style>
        body { margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f4f4; }
        #map { height: 100vh; width: 100%; }
        .control-panel { 
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            z-index: 1000; background: white; padding: 10px 25px; 
            border-radius: 50px; box-shadow: 0 4px 25px rgba(0,0,0,0.2);
            display: flex; align-items: center; gap: 20px; min-width: 600px;
        }
        .slider-group { display: flex; align-items: center; gap: 10px; }
        .search-group { display: flex; align-items: center; gap: 5px; border-left: 1px solid #ddd; padding-left: 20px; }
        #buscaEndereco { padding: 8px 15px; border-radius: 20px; border: 1px solid #ccc; width: 220px; outline: none; }
        .btn-search { background: #2ecc71; color: white; border: none; padding: 8px 15px; border-radius: 20px; cursor: pointer; font-weight: bold; }
        .counter { position: absolute; bottom: 30px; right: 20px; z-index: 1000; background: rgba(0,0,0,0.8); color: white; padding: 12px 20px; border-radius: 8px; font-size: 14px; }
        input[type=range] { cursor: pointer; width: 150px; }
    </style>
</head>
<body>

<div class="control-panel">
    <div class="slider-group">
        <strong style="color: #2c3e50;">Ano: <span id="anoDisplay">2026</span></strong>
        <input type="range" id="anoSlider" min="2011" max="2026" value="2026" step="1">
    </div>
    <div class="search-group">
        <input type="text" id="buscaEndereco" placeholder="Buscar rua em Curitiba...">
        <button class="btn-search" onclick="buscarRua()">Ir para Rua</button>
    </div>
</div>

<div id="count" class="counter">Carregando base de dados...</div>
<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.4.1/dist/leaflet.markercluster.js"></script>

<script>
    const map = L.map('map').setView([-25.4297, -49.2719], 12);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
        attribution: '© OpenStreetMap | **Desenvolvido por Jefferson Roger © 2026**'
    }).addTo(map);

    const markers = L.markerClusterGroup();
    map.addLayer(markers);
    let bancoDadosLocal = []; // Aqui guardamos os 22 mil registros
    let markerBusca;

    function getStyle(ano) {
        const cor = ano >= 2021 ? '#2ecc71' : (ano >= 2016 ? '#f1c40f' : '#95a5a6');
        return { color: cor, weight: 5, opacity: 0.8, fillColor: cor, fillOpacity: 0.5, radius: 8 };
    }

    // --- FUNÇÃO PARA CONVERTER WKT EM CAMADA LEAFLET ---
    function wktToLayer(tipo, coordsWKT, properties) {
        const coordsRaw = coordsWKT.split(/[\s,]+/);
        let layer;

        if (tipo === 'Point') {
            layer = L.circleMarker([parseFloat(coordsRaw[1]), parseFloat(coordsRaw[0])], getStyle(properties.ano));
        } else {
            const pts = [];
            for(let i=0; i < coordsRaw.length; i+=2) {
                if(coordsRaw[i] && coordsRaw[i+1]) pts.push([parseFloat(coordsRaw[i+1]), parseFloat(coordsRaw[i])]);
            }
            layer = tipo === 'LineString' ? L.polyline(pts, getStyle(properties.ano)) : L.polygon(pts, getStyle(properties.ano));
        }
        
        if(layer) {
            layer.bindPopup(`<strong>${properties.nome}</strong><br>Ano: ${properties.ano}<br>Obs: ${properties.descricao}`);
        }
        return layer;
    }

    // --- FILTRAR E EXIBIR ---
    function filtrarPorAno(ano) {
        const anoInt = parseInt(ano);
        document.getElementById('anoDisplay').innerText = ano;
        markers.clearLayers();

        const filtrados = bancoDadosLocal.filter(p => p.ano === anoInt);
        
        filtrados.forEach(proj => {
            const camada = wktToLayer(proj.tipo, proj.coordenadas, proj);
            if(camada) markers.addLayer(camada);
        });

        document.getElementById('count').innerText = `${filtrados.length} registros encontrados (${ano})`;
    }

    // --- CARREGAMENTO INICIAL DO JSON ---
    fetch('dados_mapa.json')
        .then(res => res.json())
        .then(data => {
            bancoDadosLocal = data;
            filtrarPorAno(2026); // Inicia exibindo 2026
        })
        .catch(err => {
            document.getElementById('count').innerText = "Erro ao carregar dados.";
            console.error(err);
        });

    async function buscarRua() {
        const rua = document.getElementById('buscaEndereco').value;
        if (!rua) return;
        const query = encodeURIComponent(rua + ", Curitiba, Paraná");
        const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${query}`);
        const results = await res.json();
        if (results.length > 0) {
            const { lat, lon, display_name } = results[0];
            map.setView([lat, lon], 16);
            if (markerBusca) map.removeLayer(markerBusca);
            markerBusca = L.marker([lat, lon]).addTo(map).bindPopup(display_name).openPopup();
        }
    }

    document.getElementById('anoSlider').oninput = (e) => filtrarPorAno(e.target.value);
</script>
</body>
</html>

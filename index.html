<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>DTPI - Sistema de Gestão Geográfica</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.Default.css" />
    <style>
        body { margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f4f4; }
        #map { height: 100vh; width: 100%; z-index: 1; filter: blur(10px); pointer-events: none; transition: filter 0.5s ease; }
        
        /* --- ESTILO DO LOGIN --- */
        #login-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(44, 62, 80, 0.95);
            display: flex; justify-content: center; align-items: center;
            z-index: 9999;
        }
        .login-box {
            background: white; padding: 40px; border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 350px; text-align: center;
        }
        .login-box h2 { color: #2c3e50; margin-bottom: 25px; }
        .login-box input {
            width: 100%; padding: 12px; margin-bottom: 15px;
            border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box;
        }
        .login-box button {
            width: 100%; padding: 12px; background: #3498db; color: white;
            border: none; border-radius: 8px; cursor: pointer; font-weight: bold;
        }
        #error-msg { color: #e74c3c; font-size: 13px; margin-top: 10px; display: none; }

        /* --- PAINÉIS DO SISTEMA --- */
        .control-panel { 
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            z-index: 1000; background: white; padding: 10px 25px; 
            border-radius: 50px; box-shadow: 0 4px 25px rgba(0,0,0,0.2);
            display: flex; align-items: center; gap: 20px;
        }
        #buscaEndereco { padding: 8px 15px; border-radius: 20px; border: 1px solid #ccc; width: 250px; outline: none; }
        .btn-search { background: #2ecc71; color: white; border: none; padding: 8px 15px; border-radius: 20px; cursor: pointer; font-weight: bold; }
        .counter { position: absolute; bottom: 30px; right: 20px; z-index: 1000; background: rgba(0,0,0,0.8); color: white; padding: 12px 20px; border-radius: 8px; font-size: 14px; }
        
        .relatorio-painel {
            position: absolute; top: 85px; right: 20px; width: 320px;
            max-height: 75vh; background: white; z-index: 1001;
            border-radius: 12px; box-shadow: 0 8px 25px rgba(0,0,0,0.2);
            display: none; flex-direction: column; border: 1px solid #ddd;
        }
        .relatorio-header { background: #2c3e50; color: white; padding: 12px; border-radius: 12px 12px 0 0; display: flex; justify-content: space-between; align-items: center; }
        .relatorio-corpo { padding: 10px; overflow-y: auto; background: #fff; border-radius: 0 0 12px 12px; }
        .card-projeto { border-left: 4px solid #3498db; background: #f8f9fa; padding: 12px; margin-bottom: 10px; border-radius: 4px; font-size: 13px; cursor: pointer; }
        .titulo-rua-label { font-size: 14px; font-weight: bold; color: #2c3e50; display: block; margin-bottom: 5px; border-bottom: 2px solid #3498db; }
    </style>
</head>
<body>

<div id="login-overlay">
    <div class="login-box">
        <h2>DTPI Access</h2>
        <input type="text" id="user" placeholder="Usuário">
        <input type="password" id="pass" placeholder="Senha">
        <button onclick="fazerLogin()">Entrar no Sistema</button>
        <div id="error-msg">Credenciais inválidas.</div>
    </div>
</div>

<div class="control-panel">
    <strong>Ano: <span id="anoDisplay">2026</span></strong>
    <input type="range" id="anoSlider" min="2011" max="2026" value="2026" step="1">
    <input type="text" id="buscaEndereco" placeholder="Digite o nome da rua">
    <button class="btn-search" onclick="buscarRua()">Consultar Rua</button>
</div>

<div id="count" class="counter">Aguardando Login...</div>

<div id="painelRelatorio" class="relatorio-painel">
    <div class="relatorio-header">
        <strong>Histórico Geográfico</strong>
        <span style="cursor:pointer;" onclick="document.getElementById('painelRelatorio').style.display='none'">×</span>
    </div>
    <div id="listaProjetos" class="relatorio-corpo"></div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.4.1/dist/leaflet.markercluster.js"></script>

<script>
    const map = L.map('map').setView([-25.4297, -49.2719], 12);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);

    const markers = L.markerClusterGroup({ disableClusteringAtZoom: 18 });
    map.addLayer(markers);

    let bancoDadosLocal = [];
    let markerBusca;

    // --- LÓGICA DE ACESSO ---
    function fazerLogin() {
        const u = document.getElementById('user').value;
        const p = document.getElementById('pass').value;
        if(u === "admin" && p === "dtpi2026") {
            sessionStorage.setItem('logado', 'true');
            iniciarSistema();
        } else {
            document.getElementById('error-msg').style.display = 'block';
        }
    }

    function iniciarSistema() {
        document.getElementById('login-overlay').style.display = 'none';
        document.getElementById('map').style.filter = 'none';
        document.getElementById('map').style.pointerEvents = 'auto';
        carregarDados();
    }

    function carregarDados() {
        fetch('./dados_mapa.json?nocache=' + Date.now())
            .then(res => res.json())
            .then(data => {
                bancoDadosLocal = data;
                filtrarPorAno(2026);
            })
            .catch(err => console.error("Erro ao carregar JSON:", err));
    }

    // --- FUNÇÕES DO MAPA ---
function filtrarPorAno(ano) {
        const anoInt = parseInt(ano);
        document.getElementById('anoDisplay').innerText = ano;
        markers.clearLayers();
        
        const filtrados = bancoDadosLocal.filter(p => p.ano === anoInt);
        const listaLayers = [];
        
        filtrados.forEach(p => {
            let camada;
            // Estilo padrão para os desenhos
            const estilo = { color: '#2ecc71', weight: 5, opacity: 0.8, fillOpacity: 0.4 };
            
            try {
                // Lógica para diferenciar Linhas de Pontos (Círculos)
                // Se o tipo for Point ou se tiver apenas 1 par de coordenadas
                if (p.tipo === 'Point' || (p.coords && p.coords.length === 1)) {
                    camada = L.circleMarker(p.coords[0], { radius: 8, ...estilo });
                } else if (p.tipo === 'Polygon') {
                    camada = L.polygon(p.coords, estilo);
                } else {
                    // Padrão para LineString (Projetos de mais de uma quadra)
                    camada = L.polyline(p.coords, estilo);
                }
                
                camada.bindPopup(`<b>${p.nome}</b><br>${p.descricao || 'Sem descrição'}`);
                listaLayers.push(camada);
            } catch (e) { 
                console.error("Erro ao renderizar item:", p.nome, e); 
            }
        });
        
        markers.addLayers(listaLayers);
        document.getElementById('count').innerText = `${filtrados.length} registros em ${ano}`;
    }
    // --- EVENTOS ---
    document.getElementById('anoSlider').oninput = (e) => filtrarPorAno(e.target.value);
    document.getElementById('buscaEndereco').onkeypress = (e) => { if(e.key === 'Enter') buscarRua(); };

    if(sessionStorage.getItem('logado') === 'true') iniciarSistema();
</script>
</body>
</html>
